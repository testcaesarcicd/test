name: TapData Rollback

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt
          - prod
      last_stable_tag:
        description: 'Tag to rollback to (required)'
        required: true
        type: string
      project:
        description: 'Project name (留空则取 vars.PROJECT_NAME，再回落到仓库名)'
        required: false
        type: string
        default: ''

jobs:
  rollback:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "testcaesarcicd/tapdata-cicd-worker/.github/workflows/tapdata-rollback.yml@main"
    with:
      project: ${{ inputs.project || vars.PROJECT_NAME || github.event.repository.name }}
      target_env: ${{ inputs.target_env }}
      last_stable_tag: ${{ inputs.last_stable_tag }}
      caller_repo: ${{ github.repository }}
      worker_repo: "testcaesarcicd/tapdata-cicd-worker"
    secrets: inherit
